<!doctype html>
<html lang="en">
<body>
  <main data-automation-id="candidateExperiencePage">
    <section data-automation-id="formPanel">
      <h2>Workday Application</h2>
      <form>
        <label>First Name <input type="text" autocomplete="given-name" data-automation-id="firstName"></label>
        <label>Last Name <input type="text" autocomplete="family-name" data-automation-id="lastName"></label>
        <label>Email <input type="email" autocomplete="email" data-automation-id="email"></label>
        <fieldset>
          <legend>Are you legally authorized to work in the United States?</legend>
          <label><input type="radio" name="authorized" value="Yes"> Yes</label>
          <label><input type="radio" name="authorized" value="No"> No</label>
        </fieldset>
      </form>
    </section>
  </main>
</body>
</html>
